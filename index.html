<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open My Heart 💖</title>

    <!-- Elegant Script Font (closest to Eyesome Script on Google Fonts) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;600&family=Pacifico&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            transition: opacity 1.5s ease;
            position: relative;
        }

        /* ── Soft Floating Hearts (subtle, minimal) ── */
        .bg-heart {
            position: absolute;
            color: #ab4e52;
            animation: floatUp linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(1);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-10vh) scale(0.6);
                opacity: 0;
            }
        }

        /* ── Title ── */
        h1 {
            color: #b5405a;
            font-family: 'Great Vibes', cursive;
            font-size: 46px;
            font-weight: 400;
            margin-bottom: 60px;
            text-align: center;
            padding: 0 30px;
            animation: textGlow 3s infinite alternate;
            z-index: 10;
            letter-spacing: 1px;
        }

        @keyframes textGlow {
            from {
                text-shadow: 0 0 15px rgba(255, 100, 130, 0.15);
                opacity: 0.75;
            }

            to {
                text-shadow: 0 0 25px rgba(255, 100, 130, 0.5),
                    0 0 50px rgba(255, 50, 80, 0.15);
                opacity: 1;
            }
        }

        /* ── Heart Container ── */
        .heart-container {
            position: relative;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.4s ease;
            margin-top: 20px;
        }

        .heart-container:hover {
            transform: scale(1.06);
        }

        /* ── Minimal SVG Heart ── */
        .heart-svg {
            width: 220px;
            height: 220px;
            filter: drop-shadow(0 0 35px rgba(128, 0, 0, 0.5)) drop-shadow(0 0 80px rgba(128, 0, 0, 0.25));
            animation: gentleBeat 2s ease-in-out infinite;
        }

        .heart-svg path {
            fill: url(#heartGradient);
        }

        @keyframes gentleBeat {

            0%,
            100% {
                transform: scale(1);
            }

            30% {
                transform: scale(1.06);
            }

            40% {
                transform: scale(1);
            }

            55% {
                transform: scale(1.08);
            }

            70% {
                transform: scale(1);
            }
        }

        /* ── Subtle Hint ── */
        .click-hint {
            color: #c9184a;
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: lowercase;
            margin-top: 50px;
            z-index: 10;
            animation: hintPulse 2.5s infinite;
        }


        @keyframes hintPulse {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 0.6;
            }
        }

        /* ── Burst Animation ── */
        .burst-anim {
            animation: heartBurst 1.2s ease-out forwards !important;
        }

        @keyframes heartBurst {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            20% {
                transform: scale(0.85);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
                filter: drop-shadow(0 0 60px rgba(255, 51, 102, 0.8));
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        /* ── Mini Burst Hearts ── */
        .mini-heart {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
        }

        /* ── Fade Out ── */
        .fade-out {
            opacity: 0 !important;
            transition: opacity 0.5s ease;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            h1 {
                font-size: 30px;
                margin-bottom: 40px;
            }

            .heart-svg {
                width: 160px;
                height: 160px;
            }

            .bg-text {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>


    <div class="heart-container" id="heartContainer" onclick="burstHeart()">
        <svg class="heart-svg" id="bigHeart" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#bf5a5e" />
                    <stop offset="50%" style="stop-color:#ab4e52" />
                    <stop offset="100%" style="stop-color:#8f3e42" />
                </linearGradient>
            </defs>
            <path
                d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z" />
        </svg>
    </div>

    <p class="click-hint" id="clickHint">tap the heart... it contains my whole world.</p>


    <script>
        // ── Subtle Background Hearts ──
        (function createBgHearts() {
            for (let i = 0; i < 20; i++) {
                const h = document.createElement('div');
                h.classList.add('bg-heart');
                h.textContent = '♥';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 28 + 30) + 'px';
                const dur = Math.random() * 12 + 10;
                h.style.animationDuration = dur + 's';
                h.style.animationDelay = '-' + (Math.random() * dur) + 's';
                document.body.appendChild(h);
            }
        })();

        // ── Main Click Handler ──
        function burstHeart() {
            const container = document.getElementById('heartContainer');
            container.onclick = null;
            container.style.cursor = 'default';

            document.getElementById('clickHint').classList.add('fade-out');

            document.body.style.background = 'linear-gradient(135deg, #fce4ec, #f8bbd0)';

            const heart = document.getElementById('bigHeart');
            heart.classList.add('burst-anim');

            createHeartBurst();

            setTimeout(() => {
                window.location.href = 'love-meter.html';
            }, 1500);
        }

        // ── Minimal Heart Burst ──
        function createHeartBurst() {
            const rect = document.getElementById('bigHeart').getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            for (let i = 0; i < 35; i++) {
                setTimeout(() => spawnMini(cx, cy), Math.random() * 300);
            }
        }

        function spawnMini(x, y) {
            const el = document.createElement('div');
            el.classList.add('mini-heart');
            el.textContent = '♥';

            const size = Math.random() * 14 + 10;
            el.style.fontSize = size + 'px';
            el.style.color = ['#8b0000', '#a0001c', '#6b0012', '#c9184a', '#800020'][Math.floor(Math.random() * 5)];

            document.body.appendChild(el);

            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 160 + 80;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;

            el.animate([
                {
                    left: x + 'px', top: y + 'px',
                    opacity: 1,
                    transform: 'translate(-50%,-50%) scale(0)'
                },
                {
                    left: (x + tx * 0.5) + 'px', top: (y + ty * 0.5) + 'px',
                    opacity: 1,
                    transform: 'translate(-50%,-50%) scale(1)',
                    offset: 0.3
                },
                {
                    left: (x + tx) + 'px', top: (y + ty + 30) + 'px',
                    opacity: 0,
                    transform: 'translate(-50%,-50%) scale(0.4)'
                }
            ], {
                duration: Math.random() * 500 + 500,
                easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
                fill: 'forwards'
            });

            setTimeout(() => el.remove(), 1200);
        }
    </script>

</body>

</html>
