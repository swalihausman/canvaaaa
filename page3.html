<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory Solar System ✨</title>
    <style>
        :root {
            --space-bg: radial-gradient(circle at center, #1a0f14 0%, #050203 100%);
            --sun-glow: rgba(255, 107, 129, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: var(--space-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            font-family: 'Nunito', sans-serif;
        }

        #solar-system {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            transform: rotateX(20deg);
            margin-bottom: 40px;
        }

        /* ── The Sun (Image 6) ── */
        .sun {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-image: url('images/image6.JPG');
            background-size: cover;
            background-position: center;
            z-index: 100;
            box-shadow: 0 0 70px var(--sun-glow), inset 0 0 20px rgba(0, 0, 0, 0.3);
            border: 5px solid white;
            animation: sunPulse 4s ease-in-out infinite;
        }

        @keyframes sunPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 70px var(--sun-glow);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 110px var(--sun-glow);
            }
        }

        /* ── Birthday Message ── */
        .message-container {
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #birthday-message {
            font-family: 'Caveat', cursive;
            font-size: 50px;
            color: #ff6b81;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 107, 129, 0.5);
            border-right: 3px solid #ff6b81;
            padding-right: 5px;
            white-space: nowrap;
            overflow: hidden;
        }

        @keyframes blink {
            50% {
                border-color: transparent
            }
        }

        .cursor-blink {
            animation: blink 0.8s step-end infinite;
        }

        /* Star Background */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            pointer-events: none;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .sun {
                width: 160px;
                height: 160px;
            }

            #birthday-message {
                font-size: 35px;
            }

            .main-title {
                font-size: 28px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@600&display=swap"
        rel="stylesheet">
</head>

<body>

    <h1 class="main-title"
        style="position: absolute; top: 100px; font-family: 'Alice', serif; color: #ff6b81; text-align: center; width: 100%; text-shadow: 0 0 10px rgba(255, 107, 129, 0.3);">
        Happy Birthday Mine💎</h1>

    <div id="solar-system">
        <div class="sun"></div>
    </div>

    <div class="message-container">
        <h1 id="birthday-message" class="cursor-blink"></h1>
    </div>

    <script>
        const system = document.getElementById('solar-system');
        const messageEl = document.getElementById('birthday-message');
        const messages = [
            "I love you",
            "I miss you",
            "I want you",
            "I need you"
        ];
        let messageIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeWriter() {
            const currentMessage = messages[messageIndex];

            if (isDeleting) {
                messageEl.textContent = currentMessage.substring(0, charIndex - 1);
                charIndex--;
            } else {
                messageEl.textContent = currentMessage.substring(0, charIndex + 1);
                charIndex++;
            }

            let typingSpeed = isDeleting ? 100 : 150;

            if (!isDeleting && charIndex === currentMessage.length) {
                if (messageIndex === messages.length - 1) {
                    // If it's the last message, wait then redirect
                    setTimeout(() => {
                        window.location.href = 'page2.html';
                    }, 3000);
                    return;
                }
                isDeleting = true;
                typingSpeed = 2000; // Wait at the end of the word
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                messageIndex = (messageIndex + 1) % messages.length;
                typingSpeed = 500;
            }

            setTimeout(typeWriter, typingSpeed);
        }

        // Start typewriter after a small delay
        setTimeout(typeWriter, 1000);

        // Create Stars
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(star);
        }

        // Interactive tilting
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - centerX) / 50;
            const moveY = (e.clientY - centerY) / 50;
            system.style.transform = `rotateX(${20 + moveY}deg) rotateY(${moveX}deg)`;
        });
    </script>
</body>

</html>
